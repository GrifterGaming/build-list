<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Grifter's Build List</title>
<style>
  :root{
    --bg: #14100c;
    --bg-alt: #1b1510;
    --panel: #211a14;
    --walnut: #6b4a30;
    --walnut-light: #9c6f45;
    --amber: #e0a458;
    --amber-soft: #f0c98a;
    --text: #ece3d6;
    --text-dim: #a9998a;
    --border: #362a1e;
    --radius: 14px;
  }
  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0;
    background: radial-gradient(ellipse at top, #221a12 0%, var(--bg) 55%);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    line-height: 1.5;
  }
  a{ color: inherit; text-decoration: none; }

  /* ---------- Background photo treatment ---------- */
  .hero-bg{
    position: fixed;
    inset: 0;
    background-image: url("748930902_10240674042205109_2270964347528849487_n.jpg");
    background-size: cover;
    background-position: center 30%;
    opacity: 0.16;
    z-index: 0;
    pointer-events: none;
  }
  .hero-bg::after{
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--bg) 35%, transparent 100%);
  }
  .glow{
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(224,164,88,0.08) 0%, transparent 70%);
    bottom: -200px;
    left: -100px;
    pointer-events: none;
    z-index: 0;
  }
  .glow-2{
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(107,74,48,0.15) 0%, transparent 70%);
    top: 100px;
    right: -100px;
    pointer-events: none;
    z-index: 0;
  }
  header.hero, nav.pillbar, main, footer{ position: relative; z-index: 1; }

  /* ---------- Header ---------- */
  header.hero{
    padding: 90px 24px 60px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background:
      radial-gradient(circle at 50% 0%, rgba(224,164,88,0.10), transparent 60%);
  }
  .eyebrow{
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 12px;
    color: var(--amber);
    margin-bottom: 14px;
  }
  h1.brand{
    font-size: clamp(3rem, 8vw, 5.5rem);
    margin: 0 0 8px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 0.95;
    text-transform: uppercase;
  }
  h1.brand span{ color: var(--amber); display: block; }
  .tagline{
    color: var(--text-dim);
    font-size: 1.05rem;
    max-width: 560px;
    margin: 0 auto 28px;
  }
  .back-link{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.82rem;
    color: var(--amber);
    font-weight: 600;
  }
  .back-link:hover{ color: var(--amber-soft); }

  /* ---------- Nav ---------- */
  nav.pillbar{
    position: sticky;
    top: 0;
    z-index: 20;
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 14px 20px;
    background: rgba(20,16,12,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  nav.pillbar a{
    font-size: 0.82rem;
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all .2s ease;
    white-space: nowrap;
  }
  nav.pillbar a:hover{
    color: var(--bg);
    background: var(--amber);
    border-color: var(--amber);
  }
  nav.pillbar a.active{
    color: var(--bg);
    background: var(--amber);
    border-color: var(--amber);
  }

  /* ---------- Gallery ---------- */
  main{ max-width: 1180px; margin: 0 auto; padding: 50px 24px 80px; }
  .gallery-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .gallery-item{
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--panel);
    aspect-ratio: 4 / 3;
  }
  .gallery-item img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    cursor: pointer;
    transition: transform .3s ease;
  }
  .gallery-item:hover img{ transform: scale(1.05); }
  .gallery-note{
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 32px;
  }

  /* ---------- Lightbox ---------- */
  .lightbox{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,8,6,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .lightbox.active{ display: flex; }
  .lightbox img{
    max-width: 100%;
    max-height: 100%;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .lightbox-close{
    position: absolute;
    top: 22px;
    right: 30px;
    font-size: 2.2rem;
    line-height: 1;
    color: var(--text);
    cursor: pointer;
    transition: color .2s ease;
  }
  .lightbox-close:hover{ color: var(--amber); }

  /* ---------- Footer ---------- */
  footer{
    text-align:center;
    padding: 50px 24px 70px;
    color: var(--text-dim);
    font-size: 0.85rem;
  }
  .social-links{
    display:flex;
    justify-content:center;
    flex-wrap: wrap;
    gap: 14px;
  }
  .social-link{
    display:inline-flex;
    align-items:center;
    gap:9px;
    padding: 11px 20px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-weight: 600;
    font-size: 0.9rem;
    transition: all .2s ease;
  }
  .social-link svg{
    width: 18px;
    height: 18px;
    fill: var(--amber);
    transition: fill .2s ease;
    flex-shrink: 0;
  }
  .social-link:hover{
    background: var(--amber);
    color: var(--bg);
    border-color: var(--amber);
  }
  .social-link:hover svg{ fill: var(--bg); }

  @media (max-width: 480px){
    header.hero{ padding: 60px 18px 40px; }
  }
</style>
</head>
<body>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightbox-close">&times;</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  document.querySelectorAll('.gallery-item img').forEach(img => {
    img.addEventListener('click', () => {
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt;
      lightbox.classList.add('active');
    });
  });

  function closeLightbox(){
    lightbox.classList.remove('active');
    lightboxImg.src = '';
  }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>

</body>
